services:
  - type: keyvalue
    name: umthethx-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: umthethx-web
    runtime: node
    plan: starter
    rootDir: .
    autoDeployTrigger: commit
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter web build
    startCommand: pnpm --filter web start
    healthCheckPath: /api/health
    envVars:
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: umthethx-redis
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_USER_ID
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  - type: worker
    name: umthethx-worker
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: pnpm -C apps/web run worker:convert
    autoDeployTrigger: commit
    envVars:
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: umthethx-redis
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: LIBRETRANSLATE_URL
        value: http://libretranslate:5000
      - key: LIBRETRANSLATE_TARGET_LANG
        value: en
      - key: LIBRETRANSLATE_SOURCE_LANG
        value: auto
