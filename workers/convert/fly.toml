# Dedicated Fly.io app for the BullMQ conversion worker.
# Replace the app name before first deploy, or deploy with:
# fly launch --no-deploy --copy-config -c workers/convert/fly.toml
# fly deploy -c workers/convert/fly.toml .

app = "umthethx-worker"
# Keep the worker close to AWS S3/Textract. For eu-north-1, Fly `arn` is the best fit.
# If your production AWS region changes, update this too.
primary_region = "arn"
kill_signal = "SIGTERM"
kill_timeout = 300

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "immediate"

[env]
  PRIMARY_REGION = "ams"
  NEXT_TELEMETRY_DISABLED = "1"

[processes]
  app = "node apps/web/node_modules/tsx/dist/cli.mjs apps/web/worker/convert-worker.ts"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"
  processes = ["app"]

[[restart]]
  policy = "always"
  processes = ["app"]
